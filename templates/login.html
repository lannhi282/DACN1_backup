<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EduScan Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .portal-logo {
            font-size: 2rem;
            font-weight: bold;
            color: #6366f1;
            text-align: center;
            margin-bottom: 30px;
        }
        .form-control, .form-select {
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 12px;
        }
        .form-control:focus, .form-select:focus {
            background: #1e293b;
            color: white;
            border-color: #6366f1;
            box-shadow: none;
        }
        .btn-primary {
            background: #6366f1;
            border: none;
            padding: 12px;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-primary:hover {
            background: #4f46e5;
            transform: translateY(-2px);
        }
        .alert {
            font-size: 0.9rem;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="portal-logo">EduScan Portals</div>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} animate__animated animate__fadeIn">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="/login" method="POST">
        <div class="mb-3">
            <label class="form-label text-secondary small">Select Your Role</label>
            <select name="role" class="form-select" required>
                <option value="student">Student Portal</option>
                <option value="teacher">Teacher Portal</option>
                <option value="admin">Admin Dashboard</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label text-secondary small">Username / Student Name</label>
            <input type="text" name="username" class="form-control" placeholder="Enter name" required>
        </div>

        <div class="mb-4">
            <label class="form-label text-secondary small">Password</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">Sign In to Portal</button>
    </form>
    
    <div class="mt-4 text-center">
        <p class="small text-secondary">Default student password is <b>123456</b></p>
    </div>
</div>

</body>
</html>
