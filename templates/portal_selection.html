<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to EduScan Portal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            max-width: 900px;
        }
        .portal-card {
            background: white;
            border: none;
            border-radius: 20px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: #333;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        .portal-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            color: #764ba2;
        }
        .icon-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            margin-bottom: 20px;
        }
        .admin-icon { background: #ffebee; color: #d32f2f; }
        .teacher-icon { background: #e3f2fd; color: #1976d2; }
        .student-icon { background: #e8f5e9; color: #388e3c; }
        
        h1 { color: white; font-weight: 700; margin-bottom: 40px; }
    </style>
</head>
<body>

<div class="container text-center">
    <h1>Welcome to EduScan Portal</h1>
    <p class="text-white mb-5">Please select your role to continue</p>

    <div class="row g-4">
        <div class="col-md-4">
            <a href="/admin/login" class="portal-card">
                <div class="icon-circle admin-icon">
                    <i class="fas fa-user-shield"></i>
                </div>
                <h4>Admin</h4>
                <p class="text-muted small">Manage classes, teachers, and students</p>
            </a>
        </div>

        <div class="col-md-4">
            <a href="/teacher/login" class="portal-card">
                <div class="icon-circle teacher-icon">
                    <i class="fas fa-chalkboard-teacher"></i>
                </div>
                <h4>Teacher</h4>
                <p class="text-muted small">Post grades, diaries, and manage leaves</p>
            </a>
        </div>

        <div class="col-md-4">
            <a href="/student/login" class="portal-card">
                <div class="icon-circle student-icon">
                    <i class="fas fa-user-graduate"></i>
                </div>
                <h4>Student</h4>
                <p class="text-muted small">View attendance, grades, and apply for leave</p>
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
