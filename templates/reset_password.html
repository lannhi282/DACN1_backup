<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | EduScan AI</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .reset-box { background: #1e293b; padding: 40px; border-radius: 20px; border: 1px solid #334155; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        
        h2 { margin-top: 0; color: #f8fafc; text-align: center; margin-bottom: 10px; }
        p { color: #94a3b8; font-size: 14px; text-align: center; margin-bottom: 30px; }

        label { display: block; margin-top: 15px; font-size: 13px; color: #94a3b8; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; font-size: 14px; margin-bottom: 15px; }
        
        .btn-reset { width: 100%; padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; background: #3b82f6; color: white; transition: 0.3s; margin-top: 10px; }
        .btn-reset:hover { background: #2563eb; }
        
        .back-link { display: block; text-align: center; margin-top: 20px; color: #64748b; text-decoration: none; font-size: 13px; }
        .back-link:hover { color: #3b82f6; }

        .alert { padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 13px; text-align: center; }
        .alert-danger { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444; }
        .alert-success { background: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid #10b981; }
    </style>
</head>
<body>

<div class="reset-box">
    <h2>Reset Password</h2>
    <p>Use your recovery key to set a new password.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form action="/reset_password" method="POST">
        <label>I am a...</label>
        <select name="role" required>
            <option value="student">Student</option>
            <option value="teacher">Teacher</option>
        </select>

        <label>Username / Student Name</label>
        <input type="text" name="username" placeholder="Enter your registered name" required>

        <label>Recovery Key</label>
        <input type="password" name="recovery_key" placeholder="Default is 12345" required>

        <label>New Password</label>
        <input type="password" name="new_password" placeholder="Create a strong password" required>

        <button type="submit" class="btn-reset">UPDATE PASSWORD</button>
    </form>

    <a href="/login" class="back-link">← Back to Login</a>
</div>

</body>
</html>
