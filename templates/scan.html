<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scanning {{ class_name }} | EduScan</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .header { position: absolute; top: 20px; text-align: center; }
        .video-container { position: relative; border-radius: 20px; overflow: hidden; border: 4px solid #3b82f6; box-shadow: 0 0 50px rgba(59, 130, 246, 0.3); background: #000; width: 800px; height: 450px; display: flex; justify-content: center; align-items: center; }
        .status-badge { position: absolute; top: 20px; left: 20px; background: rgba(34, 197, 94, 0.8); padding: 5px 15px; border-radius: 50px; color: white; font-size: 12px; z-index: 20; font-weight: bold; }
        .back-btn { position: absolute; top: 20px; right: 20px; background: #334155; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .back-btn:hover { background: #475569; }
        .scanner-line { position: absolute; width: 100%; height: 3px; background: #3b82f6; box-shadow: 0 0 15px #3b82f6; top: 0; z-index: 10; animation: scanMove 3s linear infinite; }
        @keyframes scanMove { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }
        h1 { color: #3b82f6; margin-bottom: 5px; }
        .instruction { color: #94a3b8; margin-bottom: 20px; }
        
        /* New Notification Style */
        #notification { 
            position: fixed; bottom: 30px; background: #22c55e; color: white; 
            padding: 15px 30px; border-radius: 10px; display: none; 
            font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 100;
        }
    </style>
</head>
<body>

    <a href="/" class="back-btn">← EXIT SCANNING</a>

    <div id="notification"></div>

    <div class="header">
        <h1>Attendance: {{ class_name }}</h1>
        <p class="instruction">Students should stand clearly in front of the camera</p>
    </div>

    <div class="video-container">
        <div class="status-badge">● LIVE CLASS SCANNER ACTIVE</div>
        <div class="scanner-line"></div>
        <img src="{{ url_for('video_feed') }}" width="800px">
    </div>

    <p id="clock" style="margin-top: 20px; font-family: monospace; color: #64748b;"></p>

    <script>
        // Update Clock
        setInterval(() => { 
            document.getElementById('clock').innerText = new Date().toLocaleString(); 
        }, 1000);

        // Check for recognized faces every 2 seconds
        function checkIdentity() {
            fetch('/check_identity')
                .then(response => response.json())
                .then(data => {
                    if (data.found) {
                        const note = document.getElementById('notification');
                        note.innerText = "Check-in Successful: " + data.name;
                        note.style.display = 'block';
                        
                        // Hide notification after 3 seconds
                        setTimeout(() => {
                            note.style.display = 'none';
                        }, 3000);
                    }
                });
        }

        setInterval(checkIdentity, 2000);
    </script>
</body>
</html>
