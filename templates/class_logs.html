<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ class_name }} Attendance Records</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; padding: 40px; }
        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 12px; overflow: hidden; }
        th { background: #3b82f6; color: white; padding: 15px; text-align: left; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #334155; }
        .status-present { background: #065f46; color: #a7f3d0; padding: 5px 10px; border-radius: 20px; font-size: 12px; }
        .status-absent { background: #991b1b; color: #fecaca; padding: 5px 10px; border-radius: 20px; font-size: 12px; }
        .btn-back { background: #334155; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; transition: 0.3s; }
        .btn-back:hover { background: #475569; }
        
        /* Print optimization */
        @media print {
            body { background: white; color: black; padding: 0; }
            .btn-back, button { display: none; }
            table { border: 1px solid #ccc; }
            th { background: #eee !important; color: black; }
            td { border-bottom: 1px solid #eee; }
        }
    </style>
</head>
<body>

    <div class="header-section">
        <div>
            <a href="/" class="btn-back">← Dashboard</a>
            <h1 style="margin-top: 20px;">Attendance: <span style="color: #3b82f6;">{{ class_name }}</span></h1>
        </div>
        <button onclick="window.print()" style="background: #10b981; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold;">
            🖨️ Print Report
        </button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Student Name</th>
                <th>Date</th>
                <th>Time</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            {% for log in logs %}
            <tr>
                <td style="text-transform: capitalize;">{{ log.student_name }}</td>
                <td>{{ log.log_date }}</td>
                <td>{{ log.log_time }}</td>
                <td>
                    <span class="{% if log.status == 'Present' %}status-present{% else %}status-absent{% endif %}">
                        {{ log.status }}
                    </span>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="4" style="text-align: center; color: #94a3b8; padding: 30px;">
                    No attendance records found for {{ class_name }} today.
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</body>
</html>
